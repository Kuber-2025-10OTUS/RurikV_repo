# Loki Helm Chart Values - Minimal Configuration for Homework
# Install command:
# helm repo add grafana https://grafana.github.io/helm-charts
# helm repo update
# helm upgrade --install loki grafana/loki -n monitoring -f values-loki.yaml

# Disable authentication for simplicity
loki:
  auth_enabled: false

  # Schema configuration for S3 storage
  storage:
    type: s3
    # Bucket names MUST be defined at this level (not under s3:)
    bucketNames:
      chunks: loki-logs-bucket-otus
      ruler: loki-logs-bucket-otus
      admin: loki-logs-bucket-otus
    s3:
      # S3 endpoint for Yandex Cloud Object Storage
      endpoint: https://storage.yandexcloud.net
      region: ru-central1
      # Access credentials (should be set via secrets in production)
      accessKeyId: ${S3_ACCESS_KEY}
      secretAccessKey: ${S3_SECRET_KEY}
      s3ForcePathStyle: true
      insecure: false

  # Schema config for chunks
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  # Memberlist configuration for single node (not needed for backend mode)
  memberlist:
    join_members:
      - loki-backend-0

# Single binary deployment (monolithic mode) - DISABLED
singleBinary:
  replicas: 0

# Use backend for monolithic deployment - ENABLED
backend:
  replicas: 1

  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  # Node selection - schedule on infra nodes
  nodeSelector:
    node-role: infra

  # Tolerations for infra nodes
  tolerations:
    - key: "node-role"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"

# Disable read and write (backend handles both)
read:
  replicas: 0

write:
  replicas: 0

# Gateway configuration (disabled for backend mode)
gateway:
  enabled: false
  replicas: 0

# Configure memcached caches to use infra nodes
chunksCache:
  enabled: false

resultsCache:
  enabled: false

# Disable test pods
test:
  enabled: false

# Monitoring configuration
monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

# Service account
serviceAccount:
  create: true
  name: loki

# RBAC
rbac:
  create: true

# Persistence - DISABLED for S3 storage
persistence:
  enabled: false
