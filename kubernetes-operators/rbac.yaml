---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysql-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mysql-operator
rules:
  # Full access to API server resources
  - apiGroups: [""]
    resources:
      - pods
      - services
      - persistentvolumeclaims
      - persistentvolumes
      - configmaps
      - secrets
      - events
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/status
      - replicasets
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["*"]
  # Access to our custom resource
  - apiGroups: ["otus.homework"]
    resources:
      - mysqls
      - mysqls/status
      - mysqls/finalizers
    verbs: ["*"]
  # Access to CRDs
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mysql-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mysql-operator
subjects:
  - kind: ServiceAccount
    name: mysql-operator
    namespace: default
