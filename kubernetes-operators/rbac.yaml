---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysql-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mysql-operator
rules:
  # Custom Resource Definition - manage CRD itself
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # MySQL Custom Resource - full access to our CRD
  - apiGroups: ["otus.homework"]
    resources:
      - mysqls
      - mysqls/status
      - mysqls/finalizers
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Services - create and delete
  - apiGroups: [""]
    resources:
      - services
    verbs: ["get", "list", "watch", "create", "delete"]

  # PersistentVolumes - create and delete
  - apiGroups: [""]
    resources:
      - persistentvolumes
    verbs: ["get", "list", "watch", "create", "delete"]

  # PersistentVolumeClaims - create and delete
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
    verbs: ["get", "list", "watch", "create", "delete"]

  # Deployments - needed to create MySQL deployment
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["get", "list", "watch", "create", "delete", "update"]

  # Pods - read-only for status checks
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["get", "list", "watch"]

  # Events - create for logging
  - apiGroups: [""]
    resources:
      - events
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mysql-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mysql-operator
subjects:
  - kind: ServiceAccount
    name: mysql-operator
    namespace: default
