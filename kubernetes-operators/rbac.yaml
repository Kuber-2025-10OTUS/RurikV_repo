---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysql-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mysql-operator
rules:
  # MySQL Custom Resource - watch, update status, manage finalizers (not create/delete CRs)
  - apiGroups: ["otus.homework"]
    resources:
      - mysqls
    verbs: ["get", "list", "watch", "update", "patch"]

  # MySQL status subresource - for reporting reconciliation status
  - apiGroups: ["otus.homework"]
    resources:
      - mysqls/status
    verbs: ["update", "patch"]

  # MySQL finalizers subresource - for cleanup before deletion
  - apiGroups: ["otus.homework"]
    resources:
      - mysqls/finalizers
    verbs: ["update", "patch"]

  # Services - create and delete
  - apiGroups: [""]
    resources:
      - services
    verbs: ["get", "list", "watch", "create", "delete"]

  # PersistentVolumes - create and delete
  - apiGroups: [""]
    resources:
      - persistentvolumes
    verbs: ["get", "list", "watch", "create", "delete"]

  # PersistentVolumeClaims - create and delete
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
    verbs: ["get", "list", "watch", "create", "delete"]

  # Deployments - required to deploy MySQL instances
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/status
    verbs: ["get", "list", "watch", "create", "update", "delete"]

  # Pods - read-only for health checks
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["get", "list", "watch"]

  # Events - create for operator logging
  - apiGroups: [""]
    resources:
      - events
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mysql-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mysql-operator
subjects:
  - kind: ServiceAccount
    name: mysql-operator
    namespace: default
