# Service Account for CD with admin role in homework namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cd
  namespace: homework
---
# RoleBinding to give admin role to cd service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cd-admin
  namespace: homework
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- kind: ServiceAccount
  name: cd
  namespace: homework
