apiVersion: v1
kind: Pod
metadata:
  name: web-server
  namespace: homework
spec:
  initContainers:
  - name: init-content
    image: busybox:1.36
    command:
    - sh
    - -c
    - |
      echo "<!DOCTYPE html>" > /init/index.html
      echo "<html>" >> /init/index.html
      echo "<head><title>Homework</title></head>" >> /init/index.html
      echo "<body>" >> /init/index.html
      echo "<h1>Kubernetes Homework</h1>" >> /init/index.html
      echo "<p>This page was generated by the init container.</p>" >> /init/index.html
      echo "</body>" >> /init/index.html
      echo "</html>" >> /init/index.html
      echo "index.html has been created in /init"
    volumeMounts:
    - name: shared-content
      mountPath: /init

  containers:
  - name: web-server
    image: python:3.11-alpine
    command:
    - sh
    - -c
    - |
      cd /homework
      python -m http.server 8000
    lifecycle:
      preStop:
        exec:
          command:
          - sh
          - -c
          - rm -f /homework/index.html
    volumeMounts:
    - name: shared-content
      mountPath: /homework

  volumes:
  - name: shared-content
    emptyDir: {}
