server {
    listen 80;
    server_name localhost;

    # Main location for nginx
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
    }

    # Prometheus metrics endpoint - stub_status
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;  # Only allow localhost (sidecar exporter)
        allow 172.16.0.0/12;  # Allow pod network
        allow 10.0.0.0/8;     # Allow pod network
        deny all;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}