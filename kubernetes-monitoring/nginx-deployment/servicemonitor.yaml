apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nginx-with-exporter
  namespace: monitoring
  labels:
    app: nginx-with-exporter
    release: prometheus  # This label must match your Prometheus operator's serviceMonitorSelector
spec:
  selector:
    matchLabels:
      app: nginx-with-exporter
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: true