apiVersion: v1
kind: Service
metadata:
  name: nginx-with-exporter
  namespace: monitoring
  labels:
    app: nginx-with-exporter
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: metrics
    port: 9113
    targetPort: 9113
    protocol: TCP
  selector:
    app: nginx-with-exporter