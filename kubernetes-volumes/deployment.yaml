apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  namespace: homework
  labels:
    app: web-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: web-server
    spec:
      # Node affinity for homework=true nodes (Bonus task from previous homework)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: homework
                operator: In
                values:
                - "true"
      initContainers:
      - name: init-index
        image: busybox:1.36
        command: ['sh', '-c', 'echo "<!DOCTYPE html><html><head><title>Homework</title></head><body><h1>Kubernetes Homework</h1><p>This page was generated by the init container.</p></body></html>" > /homework/index.html']
        volumeMounts:
        - name: homework
          mountPath: /homework
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
        volumeMounts:
        - name: homework
          mountPath: /usr/share/nginx/html/homework
        - name: config
          mountPath: /usr/share/nginx/html/conf
          readOnly: true
        readinessProbe:
          httpGet:
            path: /homework/index.html
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: homework
        persistentVolumeClaim:
          claimName: homework-pvc
      - name: config
        configMap:
          name: homework-config
