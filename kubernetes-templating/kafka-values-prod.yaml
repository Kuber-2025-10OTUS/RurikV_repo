# Kafka values for PROD environment
# - 5 brokers, 3 controllers (scaled down for kind demo)
# - SASL_PLAINTEXT protocol

image:
  registry: docker.io
  repository: bitnamilegacy/kafka
  tag: 3.5.2-debian-12-r0

kraft:
  enabled: true
  clusterId: "kafka-prod-cluster-001"

# 3 controllers for quorum, 5 brokers for production
# Note: For local kind cluster testing, you may want to scale down
controller:
  replicaCount: 3

broker:
  replicaCount: 5

listeners:
  client:
    protocol: SASL_PLAINTEXT
  controller:
    protocol: SASL_PLAINTEXT
  interbroker:
    protocol: SASL_PLAINTEXT

sasl:
  enabled: true
  client:
    users:
      - app_user
    passwords:
      - app_password
  interbroker:
    password: interbroker_secret_pass
  controller:
    password: controller_secret_pass

zookeeper:
  enabled: false

persistence:
  size: 8Gi
