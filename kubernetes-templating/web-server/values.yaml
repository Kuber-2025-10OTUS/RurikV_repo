# Default values for web-server.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas
replicaCount: 3

# Container image configuration (repository and tag are separate)
image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "1.25"

# Init container image configuration
initImage:
  repository: busybox
  pullPolicy: IfNotPresent
  tag: "1.36"

# Image pull secrets
imagePullSecrets: []

# Override chart name
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "monitoring"

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Pod security context
podSecurityContext: {}

# Container security context
securityContext: {}

# Service configuration
service:
  type: ClusterIP
  port: 80

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /homework/index.html
  hosts:
    - host: homework.otus
      paths:
        - path: /index.html
          pathType: Exact
        - path: /homepage
          pathType: Exact
  tls: []

# Resource limits and requests
resources: {}

# Probes configuration (can be enabled/disabled)
probes:
  readiness:
    enabled: true
    httpGet:
      path: /homework/index.html
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    enabled: false
    httpGet:
      path: /homework/index.html
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 30

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Additional volumes
volumes: []

# Additional volumeMounts
volumeMounts: []

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# ConfigMap configuration
configMap:
  enabled: true
  data:
    file: |
      # Homework Configuration File
      setting1=value1
      setting2=value2
      setting3=value3

# Init container configuration
initContainer:
  command: 'echo "<!DOCTYPE html><html><head><title>Homework</title></head><body><h1>Kubernetes Homework</h1><p>This page was generated by the init container.</p></body></html>" > /homework/index.html'

# Metrics fetch configuration (bonus from security homework)
metrics:
  enabled: true

# Redis dependency (disabled by default)
redis:
  enabled: false
  auth:
    enabled: false
